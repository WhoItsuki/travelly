<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="site-shell">
        <header class="site-header">
            <a class="brand" href="index.html">Travelly</a>
            <nav class="site-nav">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="signup.html">Sign Up</a>
                <a href="contactus.html">Contact</a>
            </nav>
        </header>

        <main class="form-content">
            <div class="form-shell">
                <h1>Create your account</h1>
                <p>Sign up once and start booking trips from any device.</p>
                <div class="form-field">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Jane Doe">
                </div>
                <div class="form-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="jane@example.com">
                </div>
                <div class="form-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="janedoe">
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••">
                </div>
                <div class="form-field">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••">
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" type="button" onclick="signup()">Sign Up</button>
                    <a class="btn" href="login.html">Already have an account?</a>
                </div>
            </div>
        </main>

        <footer class="footer">
            <span>Secure sign-up with a responsive layout.</span>
            <nav>
                <a href="index.html">Home</a>
                <a href="contactus.html">Contact</a>
            </nav>
        </footer>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js" integrity="sha256-+e8gO0IMAQ0Eq1PMQnKDmTGHU6Q2LvH1Z8P2mM5JxJs=" crossorigin="anonymous"></script>
    <script src="../js/main.js"></script>
    <script src="../js/signup.js"></script>
</body>
</html>
